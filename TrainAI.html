<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Klangdoi AI-2 PWA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="theme-color" content="#2d5a27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Klangdoi AI">

    <link rel="manifest"
        href="data:application/manifest+json,{'name':'Klangdoi Garden AI','short_name':'KlangdoiAI','start_url':'.','display':'standalone','background_color':'#ffffff','theme_color':'#2d5a27'}">

    <style>
        :root {
            --primary: #28a745;
            --secondary: #007bff;
            --bg: #f0f4f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: var(--bg);
            margin: 0;
        }

        .card {
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #2d5a27;
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        #image-preview {
            width: 100%;
            border-radius: 20px;
            display: none;
            margin-bottom: 20px;
            border: 4px solid #f8f9fa;
        }

        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 10px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            color: white;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-camera {
            background: var(--primary);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }

        .btn-album {
            background: var(--secondary);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-icon {
            font-size: 24px;
        }

        input[type="file"] {
            display: none;
        }

        #status-text {
            margin-bottom: 15px;
            font-weight: bold;
            color: #444;
            min-height: 20px;
        }

        .prediction-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            background: #f8f9fa;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            border-left: 6px solid #ccc;
        }

        .top-match {
            background: #d4edda !important;
            border-left-color: #28a745 !important;
            color: #155724;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Klangdoi AI-2</h2>
        <p>เครื่องมือวิเคราะห์สายพันธุ์มะเดื่อฝรั่ง</p>

        <div class="btn-container">
            <label class="btn btn-camera">
                <span class="btn-icon">📸</span>
                <span>ถ่ายรูปสด</span>
                <input type="file" accept="image/*" capture="environment" onchange="processImage(event)">
            </label>

            <label class="btn btn-album">
                <span class="btn-icon">🖼️</span>
                <span>เลือกรูปภาพ</span>
                <input type="file" accept="image/*" onchange="processImage(event)">
            </label>
        </div>

        <img id="image-preview" src="#" alt="Preview" />

        <div id="status-text"></div>
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        // <<-- แก้ไขใหม่: ใส่ลิงก์โมเดลของคุณตรงนี้
        const URL = "https://teachablemachine.withgoogle.com/models/SD27UQkzC/";

        let model, maxPredictions;

        // โหลดโมเดล
        async function setup() {
            try {
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();
                document.getElementById('status-text').innerHTML = "✅ ระบบพร้อมทำงาน";
            } catch (e) {
                document.getElementById('status-text').innerHTML = "❌ โหลดโมเดลไม่สำเร็จ";
            }
        }
        setup();

        async function processImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const preview = document.getElementById('image-preview');
            const status = document.getElementById('status-text');
            const labelContainer = document.getElementById('label-container');

            preview.src = window.URL.createObjectURL(file);
            preview.style.display = "block";
            status.innerHTML = "⌛ กำลังวิเคราะห์...";
            labelContainer.innerHTML = "";

            preview.onload = async () => {
                const prediction = await model.predict(preview);
                const results = prediction.sort((a, b) => b.probability - a.probability);

                status.innerHTML = "วิเคราะห์เสร็จสิ้น:";

                for (let i = 0; i < maxPredictions; i++) {
                    const score = (results[i].probability * 100).toFixed(0);
                    if (score > 1) {
                        const div = document.createElement("div");
                        div.className = "prediction-item" + (i === 0 && score > 50 ? " top-match" : "");
                        div.innerHTML = `<span>${results[i].className}</span> <span>${score}%</span>`;
                        labelContainer.appendChild(div);
                    }
                }
            };
        }

        // Service Worker สำหรับ PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGV2ZW50ID0+IHsgfSk7');
            });
        }
    </script>

</body>

</html>
