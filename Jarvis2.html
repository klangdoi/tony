<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>JARVIS</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ccff;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
      letter-spacing: 3px;
    }

    #circle {
      margin: 40px auto;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 4px solid #00ccff;
      box-shadow: 0 0 30px #00ccff;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 10px #00ccff;
      }

      50% {
        transform: scale(1.1);
        box-shadow: 0 0 40px #00ccff;
      }

      100% {
        transform: scale(1);
        box-shadow: 0 0 10px #00ccff;
      }
    }

    input {
      width: 80%;
      padding: 12px;
      font-size: 18px;
      background: black;
      color: #00ccff;
      border: 1px solid #00ccff;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #00ccff;
      border: none;
      font-size: 16px;
    }

    #log {
      margin-top: 20px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <h1>JARVIS ONLINE</h1>

  <div id="circle"></div>

  <input type="search" id="cmd" placeholder="🎤 Speak..." x-webkit-speech>

  <br>
  <button onclick="activate()">Activate</button>
  <button onclick="shutdown()">Shutdown</button>

  <div id="log">Status: Ready</div>

  <script>
    const ESP_IP = "192.168.0.101"; // 🔥 ใส่ IP

    // 🔊 เสียง Jarvis
    function speak(text) {
      let msg = new SpeechSynthesisUtterance(text);

      msg.pitch = 0.7;
      msg.rate = 0.9;

      speechSynthesis.speak(msg);
    }

    // ⚡ animation react
    function flash() {
      let c = document.getElementById("circle");
      c.style.boxShadow = "0 0 80px #00ccff";
      setTimeout(() => {
        c.style.boxShadow = "0 0 20px #00ccff";
      }, 200);
    }

    // 🎤 รับคำสั่งจาก voice input
    document.getElementById("cmd").addEventListener("change", function () {

      let text = this.value.toLowerCase();
      document.getElementById("log").innerText = "Heard: " + text;

      fetch(`http://${ESP_IP}/cmd?c=${text}`).catch(() => { });

      flash();

      // 🤖 logic
      if (text.includes("7")) {
        speak("Arc reactor activated");
      }
      else if (text.includes("8")) {
        speak("System shutting down");
      }
      else if (text.includes("1")) {
        speak("I am working on it, sir.");
      }
      else if (text.includes("2")) {
        speak("Right away, sir.");
      }
      else if (text.includes("6")) {
        speak("Hello sir    I am JAVIS sysem ready  ");
      }
      else if (text.includes("5")) {
        speak("At your service, sir.");
      }
      else if (text.includes("4")) {
        speak("Welcome home, sir.");
      }
      else if (text.includes("3")) {
        speak("As you wish, sir.");
      }
      else {
        speak(text);
      }

    });

    // 🔘 ปุ่ม
    function activate() {
      fetch(`http://${ESP_IP}/cmd?c=activate`);
      speak("System online");
    }

    function shutdown() {
      fetch(`http://${ESP_IP}/cmd?c=shutdown`);
      speak("System shutting down");
    }

    // 🔊 sound reactive (optional)
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
      let ctx = new AudioContext();
      let analyser = ctx.createAnalyser();

      let mic = ctx.createMediaStreamSource(stream);
      mic.connect(analyser);

      analyser.fftSize = 256;
      let data = new Uint8Array(analyser.frequencyBinCount);

      function loop() {
        requestAnimationFrame(loop);

        analyser.getByteFrequencyData(data);

        let sum = data.reduce((a, b) => a + b, 0);
        let vol = sum / data.length;

        let level = Math.min(100, Math.floor(vol / 2));

        fetch(`http://${ESP_IP}/sound?v=${level}`).catch(() => { });
      }

      loop();
    });
  </script>

</body>

</html>
